# Outlier Configuration File
#
# This is an example configuration file for the Outlier API server.
# Copy this file and customize the values as needed.

[logging]
# Log level: trace, debug, info, warn, error
level = "info"

# Log output: stdout, stderr, or a file path
output = "stdout"

# Log format: compact, pretty, json
format = "compact"

[server]
# Port to listen on
port = 3000

# IP address to bind to (0.0.0.0 for all interfaces)
bind_ip = "0.0.0.0"

[auth]
# Enable API key authentication (disabled by default)
# enabled = true
# Keys loaded from OUTLIER_API_KEYS env var (comma-separated) at startup.
# Env var takes precedence. Fallback for local dev only:
# api_keys = ["dev-only-key"]

[rate_limit]
# Enable rate limiting (disabled by default)
# enabled = true
# per_ip_per_second = 10
# per_ip_burst = 20
# global_per_second = 100
# global_burst = 200
